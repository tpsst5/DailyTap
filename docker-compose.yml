version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: dailytap-mongo
    ports:
      - "27017:27017"
    volumes:
      - dailytap-mongo-data:/data/db
  api:
    build:
      context: .
      dockerfile: DailyTap.Api/Dockerfile
    container_name: dailytap-api
    depends_on:
      - mongo
    ports:
      - "61599:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      MongoSettings__ConnectionString: mongodb://mongo:27017
      MongoSettings__Database: dailytap
      MongoSettings__UsersCollection: users
      MongoSettings__HabitsCollection: habits
      JwtOptions__Issuer: DailyTap.Api
      JwtOptions__Audience: DailyTap.Mobile
      JwtOptions__ExpiresMinutes: "60"
    env_file:
      - .env
    profiles:
      - api
  ui:
    build:
      context: ./DailyTap.UI
      dockerfile: Dockerfile
    container_name: dailytap-ui
    depends_on:
      - api
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    environment:
      EXPO_PUBLIC_API_URL: http://api:8080
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    volumes:
      - ./DailyTap.UI:/app
      - /app/node_modules
    profiles:
      - ui
volumes:
  dailytap-mongo-data:
